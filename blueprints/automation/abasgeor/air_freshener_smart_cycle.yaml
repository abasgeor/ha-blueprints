blueprint:
  name: Smart Air Freshener Cycle
  description: >
    Runs an air-freshener / aroma diffuser on a smart schedule with room-type
    presets, optional motion-awareness and quiet hours.


    ### What it does

    Turns a switch/plug on for `spray_duration` seconds every
    `cycle_interval` minutes — but both numbers auto-tune to sensible
    defaults based on the **room type** you pick. Optional modifiers make
    it skip when nobody's home, when it's night, or when the bathroom is
    steamy (so fragrance isn't wasted during a shower).


    ### Room-type presets

    | Room type       | Interval | Spray  | Notes                               |
    |-----------------|----------|--------|-------------------------------------|
    | BATHROOM        | 30 min   |  5 s   | After-use pulse if motion-aware     |
    | BEDROOM         | 60 min   |  3 s   | Paused during sleep hours           |
    | LIVING_ROOM     | 45 min   | 10 s   | Daytime focus                        |
    | KITCHEN         | 30 min   | 10 s   | Helps mask cooking odors            |
    | LARGE_ROOM      | 30 min   | 15 s   | Open-plan / high-ceiling spaces     |
    | ENTRYWAY        | 60 min   |  5 s   | First-impression setting            |
    | CUSTOM          | you set  | you set| Full manual                         |

    You can override any preset with the custom interval/duration fields
    below.


    ### Extra features

    - **Motion-aware (bathroom smart mode)** — when enabled with a motion
      sensor, the bathroom preset switches behaviour: it only sprays once
      about 2 minutes **after** motion ended (so it covers the visit
      properly). Other rooms use motion just as an "only if recent
      activity" gate.

    - **Quiet hours** — don't spray between e.g. 22:00 and 07:00.

    - **Humidity-skip (bathroom)** — skip the spray if a humidity sensor
      reads above a threshold (steam from shower). Saves fragrance.

    - **Fail-safe** — always turns the switch back off after the spray
      even if HA restarts mid-cycle (state recovery on startup).


    ### Requirements

    - A `switch.*` or `light.*` entity controlling your device. Works with
      any brand (Etekcity VeSync, Tuya, Shelly, Sonoff, Zigbee plugs…).

    - Optional: `binary_sensor.*_motion` for presence-aware mode.

    - Optional: `sensor.*_humidity` for humidity-skip mode.


    **Version:** 1.0.0
    **Author:** abasgeor
    **License:** MIT

  domain: automation
  source_url: https://github.com/abasgeor/ha-blueprints/blob/main/blueprints/automation/abasgeor/air_freshener_smart_cycle.yaml

  input:
    # ── SECTION 1: DEVICE ────────────────────────────────────────────
    device_section:
      name: Device
      icon: mdi:spray
      collapsed: false
      input:
        freshener_switch:
          name: Air freshener switch/plug
          description: The switch or light entity that activates the diffuser.
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - light
                    - input_boolean

    # ── SECTION 2: ROOM PRESET ───────────────────────────────────────
    preset_section:
      name: Room type
      icon: mdi:home-variant
      collapsed: false
      input:
        room_type:
          name: Room type preset
          description: >
            Pick the preset that best matches the room. It sets the default
            cycle interval and spray duration. You can still override below.
          default: LIVING_ROOM
          selector:
            select:
              options:
                - label: "Bathroom (30 min / 5 s)"
                  value: BATHROOM
                - label: "Bedroom (60 min / 3 s)"
                  value: BEDROOM
                - label: "Living room (45 min / 10 s)"
                  value: LIVING_ROOM
                - label: "Kitchen (30 min / 10 s)"
                  value: KITCHEN
                - label: "Large / open room (30 min / 15 s)"
                  value: LARGE_ROOM
                - label: "Entryway (60 min / 5 s)"
                  value: ENTRYWAY
                - label: "Custom (use fields below)"
                  value: CUSTOM

    # ── SECTION 3: OVERRIDES ─────────────────────────────────────────
    override_section:
      name: Overrides (optional)
      icon: mdi:tune
      collapsed: true
      input:
        custom_interval:
          name: Custom interval (minutes)
          description: >
            Leave at 0 to use the room preset. Non-zero overrides the preset.
          default: 0
          selector:
            number:
              min: 0
              max: 720
              unit_of_measurement: min
              mode: box
        custom_duration:
          name: Custom spray duration (seconds)
          description: >
            Leave at 0 to use the room preset. Non-zero overrides the preset.
          default: 0
          selector:
            number:
              min: 0
              max: 120
              unit_of_measurement: s
              mode: box

    # ── SECTION 4: QUIET HOURS ───────────────────────────────────────
    quiet_section:
      name: Quiet hours
      icon: mdi:sleep
      collapsed: false
      input:
        quiet_enabled:
          name: Enable quiet hours
          default: true
          selector:
            boolean:
        quiet_start:
          name: Quiet hours start
          default: "22:00:00"
          selector:
            time:
        quiet_end:
          name: Quiet hours end
          default: "07:00:00"
          selector:
            time:

    # ── SECTION 5: MOTION (OPTIONAL) ─────────────────────────────────
    motion_section:
      name: Motion awareness (optional)
      icon: mdi:motion-sensor
      collapsed: true
      input:
        motion_sensor:
          name: Motion / occupancy sensor
          description: >
            Optional. If provided and room is BATHROOM, sprays ~2 min after
            motion ends (after-use mode). For other rooms, only sprays if
            motion was detected in the last `motion_recent_minutes`.
          default: {}
          selector:
            entity:
              filter:
                - domain: binary_sensor
        motion_recent_minutes:
          name: "Motion recency window (non-bathroom rooms)"
          description: >
            For non-bathroom rooms, only spray if motion was detected within
            this many minutes.
          default: 30
          selector:
            number:
              min: 5
              max: 240
              unit_of_measurement: min

    # ── SECTION 6: HUMIDITY SKIP (OPTIONAL) ──────────────────────────
    humidity_section:
      name: Humidity skip (optional)
      icon: mdi:water-percent
      collapsed: true
      input:
        humidity_sensor:
          name: Humidity sensor
          description: >
            Optional. If the humidity rises above the threshold, skip the
            cycle (useful in bathrooms during showers).
          default: {}
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity
        humidity_skip_above:
          name: Skip if humidity above (%)
          default: 75
          selector:
            number:
              min: 40
              max: 100
              unit_of_measurement: "%"
              mode: slider

mode: restart
max_exceeded: silent

variables:
  # Inputs resolved to variables
  room_type_var: !input room_type
  custom_interval_var: !input custom_interval
  custom_duration_var: !input custom_duration
  quiet_enabled_var: !input quiet_enabled
  quiet_start_var: !input quiet_start
  quiet_end_var: !input quiet_end
  motion_sensor_var: !input motion_sensor
  motion_recent_minutes_var: !input motion_recent_minutes
  humidity_sensor_var: !input humidity_sensor
  humidity_skip_above_var: !input humidity_skip_above
  freshener_switch_var: !input freshener_switch
  # Preset lookup tables
  preset_interval: >-
    {% set t = {
      'BATHROOM': 30,
      'BEDROOM': 60,
      'LIVING_ROOM': 45,
      'KITCHEN': 30,
      'LARGE_ROOM': 30,
      'ENTRYWAY': 60,
      'CUSTOM': 30
    } %}
    {{ t.get(room_type_var, 30) }}
  preset_duration: >-
    {% set t = {
      'BATHROOM': 5,
      'BEDROOM': 3,
      'LIVING_ROOM': 10,
      'KITCHEN': 10,
      'LARGE_ROOM': 15,
      'ENTRYWAY': 5,
      'CUSTOM': 5
    } %}
    {{ t.get(room_type_var, 5) }}
  interval_min: >-
    {{ custom_interval_var if custom_interval_var > 0 else preset_interval | int }}
  duration_s: >-
    {{ custom_duration_var if custom_duration_var > 0 else preset_duration | int }}
  has_motion_sensor: "{{ motion_sensor_var not in [none, '', {}] }}"
  has_humidity_sensor: "{{ humidity_sensor_var not in [none, '', {}] }}"
  is_bathroom: "{{ room_type_var == 'BATHROOM' }}"

trigger:
  # Periodic timer trigger for most rooms
  - platform: time_pattern
    minutes: "/1"
    id: tick

  # Bathroom motion-end trigger (after-use pulse)
  - platform: state
    entity_id: !input motion_sensor
    to: "off"
    for:
      minutes: 2
    id: bathroom_afteruse

action:
  - variables:
      now_minute: "{{ now().minute }}"
      now_hour: "{{ now().hour }}"
      qs_h: "{{ quiet_start_var[0:2] | int }}"
      qs_m: "{{ quiet_start_var[3:5] | int }}"
      qe_h: "{{ quiet_end_var[0:2] | int }}"
      qe_m: "{{ quiet_end_var[3:5] | int }}"
      now_mins: "{{ now().hour * 60 + now().minute }}"
      qs_mins: "{{ qs_h * 60 + qs_m }}"
      qe_mins: "{{ qe_h * 60 + qe_m }}"
      in_quiet_hours: >-
        {% if not quiet_enabled_var %}false
        {% elif qs_mins < qe_mins %}
          {{ qs_mins <= now_mins < qe_mins }}
        {% else %}
          {{ now_mins >= qs_mins or now_mins < qe_mins }}
        {% endif %}
      humidity_block: >-
        {% if has_humidity_sensor %}
          {{ (states(humidity_sensor_var) | float(default=0))
             >= humidity_skip_above_var }}
        {% else %}false{% endif %}
      motion_recent: >-
        {% if has_motion_sensor %}
          {% set ls = states[motion_sensor_var].last_changed if states[motion_sensor_var] else now() %}
          {{ (as_timestamp(now()) - as_timestamp(ls)) / 60
             < motion_recent_minutes_var
             or states(motion_sensor_var) == 'on' }}
        {% else %}true{% endif %}

  - choose:
      # ── Bathroom + motion → after-use spray ─────────────────────────
      - conditions:
          - condition: trigger
            id: bathroom_afteruse
          - "{{ is_bathroom and has_motion_sensor }}"
          - "{{ not in_quiet_hours|bool }}"
          - "{{ not humidity_block|bool }}"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ freshener_switch_var }}"
          - delay:
              seconds: "{{ duration_s | int }}"
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ freshener_switch_var }}"

      # ── Non-bathroom / bathroom without motion → timed cycle ───────
      - conditions:
          - condition: trigger
            id: tick
          - "{{ (now().minute % (interval_min|int)) == 0 }}"
          - "{{ not in_quiet_hours|bool }}"
          - "{{ not humidity_block|bool }}"
          - "{{ motion_recent|bool }}"
          # For bathroom+motion we already handle via after-use; skip tick
          - "{{ not (is_bathroom and has_motion_sensor) }}"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ freshener_switch_var }}"
          - delay:
              seconds: "{{ duration_s | int }}"
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ freshener_switch_var }}"
