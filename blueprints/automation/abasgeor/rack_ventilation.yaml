blueprint:
  name: Rack Ventilation
  description: |
    **Smart rack/cabinet fan control by temperature with hysteresis, emergency mode, and sensor fail-safe.**

    Battle-tested pattern for IT rack, network cabinet, and server closet ventilation.

    ## Features

    - **N switches** — supports one or several fans in parallel (1..N)
    - **Configurable hysteresis** — distinct `temp_on` and `temp_off` prevent oscillation near the threshold
    - **Temporal stability** — the temperature must hold above/below the threshold for `stable_seconds` before acting (anti-flapping)
    - **Emergency mode** — if temperature exceeds `temp_critical`, forces ON immediately with a critical notification
    - **Sensor fail-safe** — if the sensor is `unavailable`/`unknown` for more than `sensor_failsafe_minutes`, turns ON as a precaution and notifies
    - **Periodic sync** — verification every `periodic_check_minutes` corrects state if triggers are missed (e.g. after HA restart)
    - **State recovery** — on HA start, evaluates current state and corrects
    - **Optional notifications** — for critical events (`critical` / `sensor_failure`) via any `notify.*` service
    - **Logbook + system_log** — configurable traceability

    ## Minimum inputs required

    - `temperature_sensor` (1 temperature sensor)
    - `fan_switches` (1 or more switches)

    The rest has sensible defaults (ON ≥ 32 °C, OFF < 31.5 °C, 30 s stable, check every 5 min, critical 40 °C).

    ## Usage pattern

    1. Per rack, create an automation that uses this blueprint
    2. Select the rack's temperature sensor
    3. Select the fan switch(es)
    4. Optionally adjust thresholds and notifications
    5. Set `logbook_name` so logs are easy to filter

    **Version:** 1.0 (2026-04-21)

  domain: automation
  source_url: https://github.com/abasgeor/ha-blueprints/blob/main/blueprints/automation/abasgeor/rack_ventilation.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    sensors_section:
      name: 📡 Temperature sensor
      icon: mdi:thermometer
      collapsed: false
      input:
        temperature_sensor:
          name: Rack temperature sensor
          description: Entity of the sensor that measures the rack's internal temperature (°C)
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

    switches_section:
      name: 🌀 Fans
      icon: mdi:fan
      collapsed: false
      input:
        fan_switches:
          name: Fan switch(es)
          description: One or several switches that control the fans. If you have two in parallel, select both.
          selector:
            entity:
              filter:
                - domain: switch
              multiple: true

    thresholds_section:
      name: 🌡️ Temperature thresholds
      icon: mdi:thermometer-alert
      collapsed: false
      input:
        temp_on:
          name: Turn-on temperature (°C)
          description: Turn fans ON when temperature is greater than or equal to this value.
          default: 32
          selector:
            number:
              min: 18
              max: 60
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        temp_off:
          name: Turn-off temperature (°C)
          description: Turn fans OFF when temperature is less than this value. Must be less than `temp_on` to create hysteresis.
          default: 31.5
          selector:
            number:
              min: 18
              max: 60
              step: 0.5
              unit_of_measurement: "°C"
              mode: box
        temp_critical:
          name: Critical temperature (°C)
          description: If temperature exceeds this value, force ON without waiting for stability + critical notification.
          default: 40
          selector:
            number:
              min: 25
              max: 80
              step: 1
              unit_of_measurement: "°C"
              mode: box

    timing_section:
      name: ⏱️ Timing
      icon: mdi:timer
      collapsed: true
      input:
        stable_seconds:
          name: Stable duration (seconds)
          description: The temperature must remain above/below the threshold for this duration before acting. Anti-flapping.
          default: 30
          selector:
            number:
              min: 0
              max: 600
              step: 5
              unit_of_measurement: "s"
              mode: box
        periodic_check_minutes:
          name: Periodic check (minutes)
          description: How often to verify state and correct. Backup in case a trigger is missed.
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"
              mode: box
        sensor_failsafe_minutes:
          name: Sensor fail-safe (minutes)
          description: If the sensor is `unavailable`/`unknown` for more than this time, turn fans ON as a precaution.
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "min"
              mode: box

    logging_section:
      name: 📝 Logging and notifications
      icon: mdi:bell
      collapsed: true
      input:
        logbook_name:
          name: Logbook name
          description: Descriptive name for logbook entries (e.g. "Server-Rack-Vent")
          default: "Rack-Vent"
          selector:
            text:
        system_log_enabled:
          name: System log warning
          description: Also emit to `system_log` (warning level) when turning on/off
          default: false
          selector:
            boolean:
        notify_service:
          name: Notification service (optional)
          description: |
            `notify.*` service to send critical alerts (e.g. `notify.mobile_app_phone`).
            Leave empty if you don't want push notifications.
          default: ""
          selector:
            text:
        notify_on_critical:
          name: Notify on critical temperature
          description: Send push notification when `temp_critical` is reached
          default: true
          selector:
            boolean:
        notify_on_sensor_failure:
          name: Notify on sensor failure
          description: Send push notification when the sensor is deemed down (fail-safe)
          default: true
          selector:
            boolean:

mode: restart
max_exceeded: silent

variables:
  temperature_sensor: !input temperature_sensor
  fan_switches: !input fan_switches
  temp_on: !input temp_on
  temp_off: !input temp_off
  temp_critical: !input temp_critical
  stable_seconds: !input stable_seconds
  logbook_name: !input logbook_name
  system_log_enabled: !input system_log_enabled
  notify_service: !input notify_service
  notify_on_critical: !input notify_on_critical
  notify_on_sensor_failure: !input notify_on_sensor_failure

trigger:
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    above: !input temp_on
    for:
      seconds: !input stable_seconds
    id: temp_high
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    below: !input temp_off
    for:
      seconds: !input stable_seconds
    id: temp_low
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    above: !input temp_critical
    id: temp_critical
  - trigger: state
    entity_id: !input temperature_sensor
    to:
      - "unavailable"
      - "unknown"
    for:
      minutes: !input sensor_failsafe_minutes
    id: sensor_failed
  - trigger: time_pattern
    minutes: !input periodic_check_minutes
    id: periodic_check
  - trigger: homeassistant
    event: start
    id: ha_start

action:
  - variables:
      temp_raw: "{{ states(temperature_sensor) }}"
      temp_now: "{{ temp_raw | float(-999) }}"
      sensor_ok: "{{ temp_now != -999 and temp_raw not in ['unavailable', 'unknown'] }}"
      any_fan_on: "{{ fan_switches | select('is_state', 'on') | list | count > 0 }}"
      all_fans_off: "{{ fan_switches | select('is_state', 'on') | list | count == 0 }}"

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'temp_critical' or
                 (sensor_ok and temp_now >= temp_critical) }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ all_fans_off }}"
            then:
              - action: system_log.write
                data:
                  level: error
                  message: "🚨 {{ logbook_name }}: EMERGENCY — temperature {{ temp_now }}°C ≥ critical {{ temp_critical }}°C"
              - action: switch.turn_on
                target:
                  entity_id: "{{ fan_switches }}"
              - action: logbook.log
                data:
                  name: "{{ logbook_name }}"
                  message: "🚨 EMERGENCY — temp {{ temp_now }}°C — fan(s) forced ON"
                  domain: automation
              - if:
                  - condition: template
                    value_template: "{{ notify_on_critical and notify_service != '' }}"
                then:
                  - action: "{{ notify_service }}"
                    data:
                      title: "🚨 {{ logbook_name }} — EMERGENCY"
                      message: "Critical temperature {{ temp_now }}°C (threshold {{ temp_critical }}°C). Fan forced on."
                      data:
                        push:
                          sound:
                            name: default
                            critical: 1
                            volume: 1.0

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_failed' }}"
        sequence:
          - action: system_log.write
            data:
              level: warning
              message: "⚠️ {{ logbook_name }}: sensor {{ temperature_sensor }} down — fan(s) ON as precaution"
          - if:
              - condition: template
                value_template: "{{ all_fans_off }}"
            then:
              - action: switch.turn_on
                target:
                  entity_id: "{{ fan_switches }}"
              - action: logbook.log
                data:
                  name: "{{ logbook_name }}"
                  message: "⚠️ Sensor down — fan(s) ON as safety precaution"
                  domain: automation
          - if:
              - condition: template
                value_template: "{{ notify_on_sensor_failure and notify_service != '' }}"
            then:
              - action: "{{ notify_service }}"
                data:
                  title: "⚠️ {{ logbook_name }} — sensor down"
                  message: "Temperature sensor is not responding. Fan activated for safety."

      - conditions:
          - condition: template
            value_template: "{{ sensor_ok }}"
          - condition: template
            value_template: >
              {{ trigger.id == 'temp_high' or
                 (trigger.id in ['periodic_check', 'ha_start'] and temp_now >= temp_on) }}
          - condition: template
            value_template: "{{ all_fans_off }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ system_log_enabled }}"
            then:
              - action: system_log.write
                data:
                  level: warning
                  message: "🔴 {{ logbook_name }}: {{ temp_now }}°C ≥ {{ temp_on }}°C — fan(s) ON"
          - action: switch.turn_on
            target:
              entity_id: "{{ fan_switches }}"
          - action: logbook.log
            data:
              name: "{{ logbook_name }}"
              message: "🔴 Temp {{ temp_now }}°C — fan(s) ON"
              domain: automation

      - conditions:
          - condition: template
            value_template: "{{ sensor_ok }}"
          - condition: template
            value_template: >
              {{ trigger.id == 'temp_low' or
                 (trigger.id in ['periodic_check', 'ha_start'] and temp_now < temp_off) }}
          - condition: template
            value_template: "{{ any_fan_on }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: "{{ fan_switches }}"
          - action: logbook.log
            data:
              name: "{{ logbook_name }}"
              message: "🟢 Temp {{ temp_now }}°C < {{ temp_off }}°C — fan(s) OFF"
              domain: automation
